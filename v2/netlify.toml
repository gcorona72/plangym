[build]
  command = "npm run build"
  publish = "dist"

# Endpoint unificado: /sync funciona igual en Netlify y Cloudflare
[[redirects]]
  from = "/sync"
  to = "/.netlify/functions/sync"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
