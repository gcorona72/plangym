<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="dumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Fondo con esquinas redondeadas (rx ~22% = look iOS-friendly) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glow detrás de la mancuerna -->
  <circle cx="256" cy="256" r="140" fill="white" opacity="0.08"/>

  <!-- Mancuerna -->
  <g transform="translate(256 256)" fill="url(#dumb)">
    <!-- Barra central -->
    <rect x="-130" y="-22" width="260" height="44" rx="10"/>
    <!-- Discos exteriores izq -->
    <rect x="-200" y="-44" width="32" height="88" rx="10"/>
    <!-- Discos interiores izq -->
    <rect x="-165" y="-66" width="38" height="132" rx="14"/>
    <!-- Discos exteriores der -->
    <rect x="168" y="-44" width="32" height="88" rx="10"/>
    <!-- Discos interiores der -->
    <rect x="127" y="-66" width="38" height="132" rx="14"/>
  </g>
</svg>
