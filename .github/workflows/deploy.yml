name: Deploy to GitHub Pages

# Despliega v2/ a GitHub Pages en cada push a main.
# La app vivirá en https://gcorona72.github.io/plangym/
#
# IMPORTANTE: En el repo de GitHub hay que activarlo una sola vez:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# No hace falta token: usa el GITHUB_TOKEN automático.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install deps
        working-directory: v2
        run: npm ci

      - name: Build
        working-directory: v2
        env:
          # GH Pages sirve el repo bajo /plangym/ (nombre del repo)
          BASE_PATH: /plangym/
        run: npm run build

      - name: SPA fallback (404 = index.html)
        working-directory: v2
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v2/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
